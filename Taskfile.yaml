version: '3'

tasks:
  deploy:claude:
    desc: Claude Code の agents/commands/hooks/settings を ~/.claude に、起動ランチャーを ~/bin に symlink する
    cmds:
      - mkdir -p ~/.claude/agents ~/.claude/commands ~/.claude/hooks ~/bin
      - ln -sfn {{.ROOT_DIR}}/claude/agents/reviewer.md ~/.claude/agents/reviewer.md
      - ln -sfn {{.ROOT_DIR}}/claude/agents/tester.md ~/.claude/agents/tester.md
      - ln -sfn {{.ROOT_DIR}}/claude/agents/security-reviewer.md ~/.claude/agents/security-reviewer.md
      - ln -sfn {{.ROOT_DIR}}/claude/commands/review.md ~/.claude/commands/review.md
      - ln -sfn {{.ROOT_DIR}}/claude/hooks/review-gate.sh ~/.claude/hooks/review-gate.sh
      - ln -sfn {{.ROOT_DIR}}/claude/hooks/dangerous-command-guard.sh ~/.claude/hooks/dangerous-command-guard.sh
      - ln -sfn {{.ROOT_DIR}}/claude/hooks/commit-gate.sh ~/.claude/hooks/commit-gate.sh
      - ln -sfn {{.ROOT_DIR}}/claude/hooks/load-context.sh ~/.claude/hooks/load-context.sh
      - ln -sfn {{.ROOT_DIR}}/claude/hooks/notify.sh ~/.claude/hooks/notify.sh
      - ln -sfn {{.ROOT_DIR}}/claude/settings.json ~/.claude/settings.json
      - ln -sfn {{.ROOT_DIR}}/claude/bin/engineer ~/bin/engineer
      - ln -sfn {{.ROOT_DIR}}/claude/bin/business ~/bin/business

  worker:engineer:
    desc: engineer プロファイルで Claude Code を起動する(レビューゲート有効)
    cmds:
      - CLAUDE_WORKER_MODE=engineer claude

  worker:business:
    desc: business プロファイルで Claude Code を起動する(雑務向け・レビューゲート無効)
    cmds:
      - CLAUDE_WORKER_MODE=business claude

  agent-team:
    desc: AIエージェントチーム(worker + reviewer)の Zellij セッションを起動する
    cmds:
      - zellij --layout {{.ROOT_DIR}}/zellij/agent-team-layout.kdl
